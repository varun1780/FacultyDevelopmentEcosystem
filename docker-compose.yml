version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: fdp_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ai_fdp_hub
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: maven:3.9.6-eclipse-temurin-17
    container_name: fdp_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    command: mvn spring-boot:run
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/ai_fdp_hub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect
      - AI_SERVICE_URL=http://ai-service:8000
      - BLOCKCHAIN_NODE_URL=http://host.docker.internal:8545

  ai-service:
    build: ./ai-service
    container_name: fdp_ai_service
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:20-alpine
    container_name: fdp_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  db_data:
