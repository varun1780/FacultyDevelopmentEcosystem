# Server Configuration
server.port=8080

# H2 Database (Development - Active by default)
spring.datasource.url=jdbc:h2:mem:ai_fdp_hub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL Database (Uncomment to use MySQL persistent database)
# spring.datasource.url=jdbc:mysql://localhost:3306/ai_fdp_hub?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=${DB_PASSWORD:password}
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expiration=86400000

# AI Service Configuration
ai.service.url=http://localhost:8000
ai.service.timeout=30000

# OpenAI Configuration (used by AI service)
openai.api.key=${OPENAI_API_KEY:sk-placeholder}

# Blockchain Configuration
blockchain.node.url=${BLOCKCHAIN_NODE_URL:http://127.0.0.1:8545}
blockchain.contract.address=${BLOCKCHAIN_CONTRACT_ADDRESS:0x5FbDB2315678afecb367f032d93F642f64180aa3}
blockchain.private.key=${BLOCKCHAIN_PRIVATE_KEY:}

# IPFS / Pinata Configuration
pinata.api.key=${PINATA_API_KEY:}
pinata.api.secret=${PINATA_API_SECRET:}
pinata.gateway.url=https://gateway.pinata.cloud/ipfs/

# Logging
logging.level.com.aifdphub=INFO
logging.level.org.springframework.security=WARN
